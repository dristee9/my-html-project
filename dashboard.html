<!-- Header include -->
<div class="py-8">
    <h1 class="text-4xl font-bold text-blue-800 mb-2">Welcome back!</h1>
    <p class="text-gray-600 mb-10">Manage your campaigns</p>
    <div class="grid grid-cols-3 gap-6 mb-12">
        <div class="bg-white p-6 rounded-xl shadow text-center">
            <div class="text-4xl font-bold text-blue-600">5</div>
            <div class="text-gray-600">Campaigns</div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow text-center">
            <div class="text-4xl font-bold text-green-600">1,00,000 BDT</div>
            <div class="text-gray-600">Raised</div>
        </div>
        <div class="bg-white p-6 rounded-xl shadow text-center">
            <div class="text-4xl font-bold text-purple-600">10</div>
            <div class="text-gray-600">Donations</div>
        </div>
    </div>
    <div class="mb-12">
        <h2 class="text-2xl font-bold mb-6">My Campaigns</h2>
        <div class="grid grid-cols-3 gap-6">
            <!-- Example Card -->
            <div class="bg-white rounded-xl shadow">
                <img src="https://via.placeholder.com/400x200" class="w-full h-40 object-cover">
                <div class="p-5">
                    <h3 class="font-bold text-lg">Title</h3>
                    <div class="w-full bg-gray-200 rounded-full h-2 mb-3">
                        <div class="bg-blue-600 h-2 rounded-full" style="width: 50%"></div>
                    </div>
                    <div class="text-sm text-gray-700">25,000 / 50,000 BDT</div>
                </div>
            </div>
        </div>
    </div>
    <div>
        <h2 class="text-2xl font-bold mb-6">My Donations</h2>
        <table class="min-w-full bg-white rounded-lg shadow">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-6 py-3 text-left">Campaign</th>
                    <th class="px-6 py-3 text-left">Amount</th>
                    <th class="px-6 py-3 text-left">Date</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="px-6 py-4">Example</td>
                    <td class="px-6 py-4">500 BDT</td>
                    <td class="px-6 py-4">01 Mar 2026</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<!-- Footer include -->
