<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FundMyIdea BD</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="app-container">
    <!-- Navigation -->
    <nav class="site-navigation">
        <div class="nav-wrapper">
            <a href="index.html" class="site-logo">FundMyIdea BD</a>
            <div class="nav-links">
                <a href="explore.html" class="nav-item">Explore Campaigns</a>
                <a href="register.html" class="nav-item">Register</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <form class="auth-form">
            <h2 class="form-title">Login to FundMyIdea BD</h2>
            
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="submit-button">Login to Account</button>
            
            <div class="form-footer">
                Don't have an account? <a href="register.html" class="form-link">Register here</a>
            </div>
        </form>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 FundMyIdea BD - Empowering Student Innovations</p>
        </div>
    </footer>
</body>
</html>
