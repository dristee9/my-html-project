<!-- Header include -->
<div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg">
    <h2 class="text-3xl font-bold text-center text-blue-800 mb-6">Create Your Student Campaign</h2>
    <form class="space-y-6">
        <div>
            <label class="block text-gray-700 font-medium mb-1">Campaign Title</label>
            <input type="text" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Eco-Friendly Waste App for Dhaka">
        </div>
        <div>
            <label class="block text-gray-700 font-medium mb-1">Description</label>
            <textarea required rows="6" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Explain your idea..."></textarea>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-gray-700 font-medium mb-1">Funding Goal (BDT)</label>
                <input type="number" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. 50000">
            </div>
            <div>
                <label class="block text-gray-700 font-medium mb-1">Deadline</label>
                <input type="date" required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
        <div>
            <label class="block text-gray-700 font-medium mb-1">Category</label>
            <select required class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Select Category</option>
                <option>Tech</option>
                <option>Education</option>
                <option>Social</option>
                <option>Art</option>
                <option>Other</option>
            </select>
        </div>
        <div>
            <label class="block text-gray-700 font-medium mb-1">Campaign Image</label>
            <input type="file" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>
        <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-semibold">Launch Campaign</button>
    </form>
</div>
<!-- Footer include -->
