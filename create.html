<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Campaign - FundMyIdea BD</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="app-container">
    <!-- Navigation -->
    <nav class="site-navigation">
        <div class="nav-wrapper">
            <a href="index.html" class="site-logo">FundMyIdea BD</a>
            <div class="nav-links">
                <a href="explore.html" class="nav-item">Explore Campaigns</a>
                <a href="login.html" class="nav-item">Login</a>
                <a href="register.html" class="nav-item">Register</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <form class="auth-form campaign-form">
            <h2 class="form-title">Create Your Student Campaign</h2>
            
            <div class="form-group">
                <label class="form-label">Campaign Title</label>
                <input type="text" class="form-control" placeholder="e.g. Eco-Friendly Waste App for Dhaka" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea class="form-control textarea" rows="6" placeholder="Explain your idea, its impact, and how the funds will be used..." required></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Funding Goal (BDT)</label>
                    <input type="number" class="form-control" placeholder="e.g. 50000" min="1000" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Campaign Deadline</label>
                    <input type="date" class="form-control" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-control" required>
                    <option value="">Select a category</option>
                    <option>Technology</option>
                    <option>Education</option>
                    <option>Social Impact</option>
                    <option>Arts & Culture</option>
                    <option>Research</option>
                    <option>Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Campaign Image</label>
                <input type="file" class="form-control" accept="image/*">
                <small style="color: var(--gray-500); font-size: 0.875rem;">Upload a compelling image that represents your campaign (JPG, PNG, max 5MB)</small>
            </div>
            
            <button type="submit" class="submit-button" style="background-color: var(--secondary-green);">Launch Campaign</button>
            
            <div class="form-footer">
                By creating a campaign, you agree to our <a href="#" class="form-link">Terms of Service</a> and <a href="#" class="form-link">Community Guidelines</a>
            </div>
        </form>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 FundMyIdea BD - Empowering Student Innovations</p>
        </div>
    </footer>
</body>
</html>
