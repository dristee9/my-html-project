<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FundMyIdea BD</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="app-container">
    <!-- Navigation -->
    <nav class="site-navigation">
        <div class="nav-wrapper">
            <a href="index.html" class="site-logo">FundMyIdea BD</a>
            <div class="nav-links">
                <a href="explore.html" class="nav-item">Explore Campaigns</a>
                <a href="login.html" class="nav-item">Login</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <form class="auth-form">
            <h2 class="form-title">Register as Student</h2>
            
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create a password" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">University</label>
                <select class="form-control" required>
                    <option value="">Select your university</option>
                    <option>BUET</option>
                    <option>Dhaka University</option>
                    <option>North South University</option>
                    <option>BRAC University</option>
                    <option>Other</option>
                </select>
            </div>
            
            <button type="submit" class="submit-button">Create Account</button>
            
            <div class="form-footer">
                Already have an account? <a href="login.html" class="form-link">Login here</a>
            </div>
        </form>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; 2026 FundMyIdea BD - Empowering Student Innovations</p>
        </div>
    </footer>
</body>
</html>
