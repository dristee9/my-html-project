<!-- Header include -->
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg">
    <h2 class="text-3xl font-bold text-center text-blue-800 mb-6">Register as Student</h2>
    <form class="space-y-4">
        <div>
            <label class="block text-gray-700">Username</label>
            <input type="text" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-gray-700">Email</label>
            <input type="email" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-gray-700">Password</label>
            <input type="password" required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-gray-700">University</label>
            <select required class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Select University</option>
                <option>BUET</option>
                <option>Dhaka University</option>
                <option>North South University</option>
                <option>BRAC University</option>
                <option>Other</option>
            </select>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700 transition">Register</button>
    </form>
    <p class="text-center mt-4 text-gray-600">Already have an account? <a href="login.html" class="text-blue-600 hover:underline">Login here</a></p>
</div>
<!-- Footer include -->
